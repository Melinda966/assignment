
<!DOCTYPE html>
<html>

<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Indian Energy Dashboard</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Poppins',sans-serif;
background:linear-gradient(120deg,#1f4037,#99f2c8);
color:white;
}

/* HEADER */

header{
text-align:center;
padding:25px;
background:rgba(0,0,0,0.4);
backdrop-filter:blur(8px);
}

header h1{
margin:0;
}

/* MAP */

#map{
height:420px;
margin:30px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

/* DASHBOARD */

.dashboard{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:25px;
padding:20px;
}

.card{
width:220px;
padding:25px;
text-align:center;
border-radius:15px;
background:rgba(255,255,255,0.15);
backdrop-filter:blur(8px);
box-shadow:0 5px 15px rgba(0,0,0,0.3);
transition:0.3s;
}

.card:hover{
transform:translateY(-6px) scale(1.05);
}

.card h2{
font-size:30px;
margin:0;
color:#fff;
}

.card p{
margin-top:8px;
}

/* CHART AREA */

.chart-area{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:30px;
padding:20px;
}

.chart-box{
background:rgba(255,255,255,0.15);
padding:20px;
border-radius:15px;
width:400px;
backdrop-filter:blur(8px);
box-shadow:0 5px 20px rgba(0,0,0,0.3);
}

footer{
text-align:center;
padding:15px;
background:rgba(0,0,0,0.5);
margin-top:20px;
}

</style>
</head>

<body>

<header>
<h1>Real Time Indian Energy Ecosystem Dashboard</h1>
</header>

<!-- MAP -->

<div id="map"></div>

<!-- ENERGY CARDS -->

<div class="dashboard">

<div class="card">
<h2 id="solar">0</h2>
<p>Solar GW</p>
</div>

<div class="card">
<h2 id="wind">0</h2>
<p>Wind GW</p>
</div>

<div class="card">
<h2 id="hydro">50</h2>
<p>Hydro GW</p>
</div>

<div class="card">
<h2 id="thermal">210</h2>
<p>Thermal GW</p>
</div>

</div>

<!-- CHARTS -->

<div class="chart-area">

<div class="chart-box">
<canvas id="barChart"></canvas>
</div>

<div class="chart-box">
<canvas id="pieChart"></canvas>
</div>

<div class="chart-box">
<canvas id="lineChart"></canvas>
</div>

</div>

<footer>
Indian Renewable Energy Visualization • 2026
</footer>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

/* MAP */

var map=L.map('map').setView([22.9734,78.6569],5);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:18
}).addTo(map);

/* ENERGY PLANTS */

var plants=[

{ name:"Rajasthan Solar Park", type:"Solar", capacity:"10 GW", location:[27.02,71.45] },

{ name:"Muppandal Wind Farm", type:"Wind", capacity:"5 GW", location:[8.25,77.55] },

{ name:"Tehri Hydro Dam", type:"Hydro", capacity:"4 GW", location:[30.38,78.48] },

{ name:"Vindhyachal Thermal Plant", type:"Thermal", capacity:"13 GW", location:[24.10,82.67] },

{ name:"Kudankulam Nuclear Plant", type:"Nuclear", capacity:"6 GW", location:[8.17,77.71] }

];

plants.forEach(function(p){

var marker=L.circleMarker(p.location,{
radius:9,
fillColor:"#ff9800",
color:"#fff",
weight:2,
fillOpacity:0.9
}).addTo(map);

marker.bindPopup(
"<b>"+p.name+"</b><br>"+
"Type: "+p.type+"<br>"+
"Capacity: "+p.capacity
);

});

/* ENERGY DATA */

var energy={
solar:60,
wind:45,
hydro:50,
thermal:210
};

/* ANIMATED COUNTER */

function animateValue(id,value){

let el=document.getElementById(id);

el.innerText=value.toFixed(1)+" GW";

}

/* CHARTS */

var barChart,pieChart,lineChart;

function updateCharts(){

let data=[energy.solar,energy.wind,energy.hydro,energy.thermal];

if(barChart) barChart.destroy();

barChart=new Chart(document.getElementById("barChart"),{

type:"bar",

data:{
labels:["Solar","Wind","Hydro","Thermal"],
datasets:[{
data:data,
backgroundColor:["#FFD54F","#4CAF50","#42A5F5","#EF5350"]
}]
}

});

if(pieChart) pieChart.destroy();

pieChart=new Chart(document.getElementById("pieChart"),{

type:"pie",

data:{
labels:["Solar","Wind","Hydro","Thermal"],
datasets:[{
data:data,
backgroundColor:["#FFC107","#00E676","#29B6F6","#FF7043"]
}]
}

});

if(lineChart) lineChart.destroy();

lineChart=new Chart(document.getElementById("lineChart"),{

type:"line",

data:{
labels:["2018","2019","2020","2021","2022","2023"],
datasets:[{
label:"Solar Growth",
data:[20,30,40,50,55,energy.solar],
borderColor:"#FFD54F",
fill:false
}]
}

});

}

/* LIVE UPDATE */

function updateValues(){

energy.solar+=Math.random()*1.5;
energy.wind+=Math.random()*1.2;

animateValue("solar",energy.solar);
animateValue("wind",energy.wind);
animateValue("hydro",energy.hydro);
animateValue("thermal",energy.thermal);

updateCharts();

}

setInterval(updateValues,3000);

updateValues();

</script>

</body>
</html>
